<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ResidentOps — Login</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">🏢</span>
      <h1>ResidentOps</h1>
      <p>Apartment Governance &amp; Operations Platform</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="@{/login}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="loginPwd" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div style="margin-top:14px;text-align:center">
      <small style="color:#94a3b8">Forgot password?</small>
      <small style="color:#64748b">
        Please contact the admin:
        <a th:href="'mailto:' + ${adminEmail}" th:text="${adminEmail}" style="color:var(--primary)"></a>
      </small>
    </div>

    <div class="demo-box" style="margin-top:18px">
      <p class="demo-title">Demo Accounts</p>
      <table class="demo-table">
        <tr><th>Role</th><th>Email</th><th>Password</th></tr>
        <tr><td>Resident</td><td>arun@resident.com</td><td>pass123</td></tr>
        <tr><td>Admin</td><td>ravi@admin.com</td><td>pass123</td></tr>
        <tr><td>Vendor</td><td>ramesh@vendor.com</td><td>pass123</td></tr>
        <tr><td>Auditor</td><td>auditor@ops.com</td><td>pass123</td></tr>
      </table>
    </div>
  </div>
</div>
</body>
</html>
