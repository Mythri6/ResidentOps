<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Change Password — ResidentOps</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">🏢 ResidentOps<span class="sidebar-sub">Governance Platform</span></div>
    <div class="sidebar-user"><strong th:text="${user.name}"></strong><br><small th:text="${user.role}"></small></div>
    <nav>
      <a th:href="@{/dashboard}" class="nav-item">📊 Dashboard</a>
      <a th:href="@{/profile}" class="nav-item">👤 My Profile</a>
    </nav>
    <div class="sidebar-footer"><a th:href="@{/logout}" class="btn-logout">Sign Out</a></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h2>Change Password</h2>
      <span class="role-badge" th:text="${user.role}"></span>
    </header>
    <div class="content">

      <!-- Force change banner -->
      <div th:if="${forceChange}" class="alert alert-emergency">
        🔒 You must change your password before continuing. Default password is <strong>RO@123</strong>.
      </div>

      <div class="card" style="max-width:480px">
        <div class="card-title">Update Password</div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

        <form method="post" th:action="@{/profile/change-password}">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="currentPassword" placeholder="Enter current password" required>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" name="newPassword" placeholder="Enter new password (min 4 chars)" required>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPwd" placeholder="Re-enter new password" required
                   oninput="checkMatch()">
            <small id="matchMsg" style="color:red;display:none">Passwords do not match</small>
          </div>
          <button type="submit" class="btn btn-primary">Change Password</button>
          <a th:unless="${forceChange}" th:href="@{/profile}" class="btn" style="background:var(--bg);margin-left:8px">Cancel</a>
        </form>

        <!-- Show forgot button only after wrong password attempt -->
        <div th:if="${showForgot}" style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
          <p style="color:var(--text-muted);font-size:13px;margin-bottom:10px">
            Forgot your current password? Request admin to reset it to default.
          </p>
          <form method="post" th:action="@{/profile/request-reset}">
            <button type="submit" class="btn btn-danger btn-sm">Request Password Reset</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
function checkMatch() {
  const pwd = document.querySelector('[name=newPassword]').value;
  const confirm = document.getElementById('confirmPwd').value;
  document.getElementById('matchMsg').style.display = (confirm && pwd !== confirm) ? 'block' : 'none';
}
</script>
</body>
</html>
